name: Compilar y publicar

# - Al empujar un tag vX.Y.Z: verifica el contrato del CHANGELOG, compila el instalador
#   de Windows y la herramienta de línea de órdenes para Windows, Linux y macOS, y lo
#   adjunta todo al Release de ese tag.
# - Manualmente (workflow_dispatch): compila y deja todo como artefactos descargables.
#
# NOTA sobre la interfaz gráfica: usa WPF, que SOLO existe en Windows. Por eso para Linux
# y macOS se publica «shrinkstudio», la versión de terminal, que comparte el mismo motor.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # El contrato del CHANGELOG se comprueba ANTES de compilar: si no se cumple,
  # no se publica nada.
  # ---------------------------------------------------------------------------
  verificar-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Comprobar el contrato del CHANGELOG
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            VER="${TAG#v}"
          else
            VER=$(sed -n 's/.*<Version>\([^<]*\)<\/Version>.*/\1/p' src/ShrinkVideo/ShrinkVideo.csproj | head -1)
            echo "Sin tag: se valida la versión del proyecto ($VER)."
          fi

          echo "Versión a validar: $VER"

          # 1) formato SemVer
          [[ "$VER" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] \
            || { echo "::error::«$VER» no es SemVer X.Y.Z"; exit 1; }

          # 2) existe la sección con fecha ISO
          grep -qE "^## \[$(echo "$VER" | sed 's/\./\\./g')\] - [0-9]{4}-[0-9]{2}-[0-9]{2}$" CHANGELOG.md \
            || { echo "::error::Falta en CHANGELOG.md la sección «## [$VER] - AAAA-MM-DD»"; exit 1; }

          # 3) todos los .csproj declaran esa misma versión
          for p in src/ShrinkVideo/ShrinkVideo.csproj src/ShrinkStudio.Cli/ShrinkStudio.Cli.csproj; do
            PV=$(sed -n 's/.*<Version>\([^<]*\)<\/Version>.*/\1/p' "$p" | head -1)
            [[ "$PV" == "$VER" ]] \
              || { echo "::error::$p declara <Version>$PV</Version> pero se publica $VER"; exit 1; }
          done

          # 4) la sección tiene contenido y solo usa categorías permitidas
          BODY=$(awk -v v="## [$VER]" 'index($0,v)==1{f=1;next} /^## \[/{f=0} f' CHANGELOG.md)
          [[ -n "$(echo "$BODY" | tr -d '[:space:]')" ]] \
            || { echo "::error::La sección [$VER] está vacía"; exit 1; }
          while read -r h; do
            [[ -z "$h" ]] && continue
            case "$h" in
              "### Añadido"|"### Cambiado"|"### Obsoleto"|"### Eliminado"|"### Corregido"|"### Seguridad"|"### Notas") ;;
              *) echo "::error::Categoría no permitida en [$VER]: $h"; exit 1 ;;
            esac
          done < <(echo "$BODY" | grep '^### ' || true)

          # 5) sin versiones repetidas
          DUP=$(grep -oE '^## \[[0-9]+\.[0-9]+\.[0-9]+\]' CHANGELOG.md | sort | uniq -d)
          [[ -z "$DUP" ]] || { echo "::error::Versiones repetidas: $DUP"; exit 1; }

          echo "Contrato del CHANGELOG cumplido."

          # las notas de la Release salen del propio CHANGELOG
          { echo "$BODY"; } > release-notes.md

      - name: Guardar las notas de la versión
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md

  # ---------------------------------------------------------------------------
  # App de escritorio (WPF) + instalador. Solo Windows.
  # ---------------------------------------------------------------------------
  windows-instalador:
    needs: verificar-version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar .NET 9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Instalar Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Compilar instalador (icono + .exe self-contained + Inno)
        shell: pwsh
        run: ./build.ps1

      - name: Subir instalador como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: ShrinkStudio-Setup
          path: installer/Output/*.exe

      - name: Adjuntar al Release (solo en tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: installer/Output/*.exe

  # ---------------------------------------------------------------------------
  # Herramienta de terminal: multiplataforma de verdad.
  # ---------------------------------------------------------------------------
  cli:
    needs: verificar-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  rid: linux-x64,   nombre: linux-x64 }
          - { os: ubuntu-24.04-arm, rid: linux-arm64, nombre: linux-arm64 }
          - { os: macos-latest,   rid: osx-arm64,   nombre: macos-arm64 }
          - { os: macos-13,       rid: osx-x64,     nombre: macos-x64 }
          - { os: windows-latest, rid: win-x64,     nombre: windows-x64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Instalar .NET 9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publicar binario autocontenido
        run: >
          dotnet publish src/ShrinkStudio.Cli/ShrinkStudio.Cli.csproj
          -c Release -r ${{ matrix.rid }} --self-contained true
          -p:PublishSingleFile=true -p:DebugType=none
          -o publicado

      - name: Comprobar que arranca
        shell: bash
        run: |
          BIN=publicado/shrinkstudio
          [[ -f "$BIN.exe" ]] && BIN="$BIN.exe"
          chmod +x "$BIN" || true
          "$BIN" version
          "$BIN" --help > /dev/null

      - name: Empaquetar
        shell: bash
        run: |
          cd publicado
          if [[ "${{ matrix.rid }}" == win-* ]]; then
            7z a "../shrinkstudio-${{ matrix.nombre }}.zip" shrinkstudio.exe
          else
            chmod +x shrinkstudio
            tar czf "../shrinkstudio-${{ matrix.nombre }}.tar.gz" shrinkstudio
          fi

      - name: Subir como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: shrinkstudio-${{ matrix.nombre }}
          path: |
            shrinkstudio-${{ matrix.nombre }}.zip
            shrinkstudio-${{ matrix.nombre }}.tar.gz
          if-no-files-found: error

      - name: Adjuntar al Release (solo en tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            shrinkstudio-${{ matrix.nombre }}.zip
            shrinkstudio-${{ matrix.nombre }}.tar.gz

  # ---------------------------------------------------------------------------
  # Notas de la Release tomadas del CHANGELOG (el contrato garantiza que existen).
  # ---------------------------------------------------------------------------
  notas:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [windows-instalador, cli]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-notes

      - name: Publicar notas
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
